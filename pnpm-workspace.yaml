minimumReleaseAge: 1440
shellEmulator: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # semver 6 is required by Babel/Next/Sentry transitive tooling.
  - semver@6.3.1
  # slow-redact is pinned through pino -> @walletconnect/logger.
  - slow-redact@0.3.2
  # tinyexec is required by Vitest/lint-staged/Fumadocs tooling.
  - tinyexec@1.2.2

allowBuilds:
  '@parcel/watcher': false
  '@reown/appkit': false
  '@sentry/cli': true
  '@swc/core': true
  bufferutil: false
  esbuild: true
  keccak: false
  sharp: true
  utf-8-validate: false

overrides:
  '@walletconnect/relay-auth>@noble/curves': 1.8.1
  '@walletconnect/relay-auth>@noble/hashes': 1.7.1
