minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - '@next/env@16.3.0-preview.8'
  - '@next/swc-darwin-arm64@16.3.0-preview.8'
  - '@next/swc-darwin-x64@16.3.0-preview.8'
  - '@next/swc-linux-arm64-gnu@16.3.0-preview.8'
  - '@next/swc-linux-arm64-musl@16.3.0-preview.8'
  - '@next/swc-linux-x64-gnu@16.3.0-preview.8'
  - '@next/swc-linux-x64-musl@16.3.0-preview.8'
  - '@next/swc-win32-arm64-msvc@16.3.0-preview.8'
  - '@next/swc-win32-x64-msvc@16.3.0-preview.8'
shellEmulator: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # semver 6 is required by Babel/Next/Sentry transitive tooling.
  - semver@6.3.1
  # slow-redact is pinned through pino -> @walletconnect/logger.
  - slow-redact@0.3.2
  # tinyexec is required by Vitest/lint-staged/Fumadocs tooling.
  - tinyexec@1.2.2
  - nanoid@3.3.14

allowBuilds:
  '@parcel/watcher': false
  '@reown/appkit': false
  '@sentry/cli': true
  '@swc/core': true
  bufferutil: false
  esbuild: true
  keccak: false
  sharp: true
  utf-8-validate: false

overrides:
  '@wagmi/connectors': 6.2.0
  '@wagmi/core': 2.22.1
  '@walletconnect/relay-auth>@noble/curves': 1.8.1
  '@walletconnect/relay-auth>@noble/hashes': 1.7.1
